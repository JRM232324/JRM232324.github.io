title: Juan Rafael Moreno
description: Cyber Security & Digital Forensics Graduate
url: "https://yourusername.github.io"
baseurl: ""

theme: minima

author:
  name: Juan Rafael Moreno
  email: rafael.moreno.cardoso@gmail.com

github_username: yourusername
linkedin_username: juanrafaelmoreno

markdown: kramdown

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

header_pages:
  - about.md
  - projects.md
  - blog.md
  - resume.md

collections:
  projects:
    output: true

defaults:
  - scope:
      path: ""
      type: "projects"
    values:
      layout: page

permalink: pretty

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
